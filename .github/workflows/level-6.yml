#############################################
# Level 6 — Rainbow Road (STUB)
#
# Doel (verhaal):
#  Scheur over Rainbow Road door je pipeline te optimaliseren.
#
# Daadwerkelijk leerdoel:
# - Caching toepassen voor snellere builds (Gradle wrapper + caches)
# - (Optioneel) Concurrency instellen om dubbele runs te annuleren
#############################################
name: Level 6 - Rainbow Road

on:
  workflow_dispatch: {}

# TODO (optioneel): voeg concurrency toe om runs te cancelen
# concurrency:
#   group: ${{ github.workflow }}-${{ github.ref }}
#   cancel-in-progress: true

jobs:
  speed-run:
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v6

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin

      # TODO - Voeg Gradle caching toe

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build
        run: ./gradlew build --scan --no-daemon
