name: Level 7 - Star Road

on:
  workflow_dispatch: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  REGISTRY: ghcr.io
  IMAGE: ghcr.io/${{ github.repository }}:${{ github.sha }}
  LATEST: ghcr.io/${{ github.repository }}:latest
  JACOCO_XML: build/reports/jacoco/test/jacocoTestReport.xml

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v6

      - name: Setup (Java + Gradle + cache)
        uses: ./.github/actions/setup-java-gradle

      - name: Build - Test - Coverage
        env:
          JACOCO_MINIMUM_COVERAGE: "0.60"
        run: ./gradlew clean build jacocoTestReport --no-daemon

      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: build/libs/*.jar

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            build/test-results/test
            build/reports/tests/test

      - name: Upload JaCoCo reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-reports
          path: |
            build/reports/jacoco/test/

  image:
    name: Build & Push Image
    runs-on: ubuntu-latest
    needs: build

    permissions:
      contents: read
      packages: write

    steps:
      - name: Check out code
        uses: actions/checkout@v6

      - name: Download JAR artifact
        uses: actions/download-artifact@v4
        with:
          name: app-jar
          path: docker

      - name: Prepare Docker context
        run: |
          JAR=$(find docker -name "*.jar" | head -n1)
          cp "$JAR" docker/app.jar

      - name: Login to GHCR
        if: github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build container image
        if: github.ref == 'refs/heads/main'
        run: |
          docker build \
            -t ${IMAGE} \
            -t ${LATEST} \
            -f docker/Dockerfile \
            docker

      - name: Push image (alleen op main)
        if: github.ref == 'refs/heads/main'
        run: |
          docker push ${IMAGE}
          docker push ${LATEST}
