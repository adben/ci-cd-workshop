name: Level 4 - Toad's Treasure House (Solution)
on:
  workflow_dispatch:
    inputs:
      artifact_name:
        description: 'Mario Code Galaxy'
        required: false
        default: app-jar

jobs:
  artifact:
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v6

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build
        run: ./gradlew build

      - name: Upload artifact (JAR)
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.inputs.artifact_name || 'app-jar' }}
          path: build/libs/*.jar
